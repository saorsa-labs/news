name: Rebuild from upstream

# Pulls the latest README from foorilla/allainews_sources, regenerates
# sources.json + index.html, and commits any changes. Runs weekly so the
# source catalogue stays current. Can also be triggered manually from the
# Actions tab.

on:
  schedule:
    # Every 30 minutes. Most runs will exit in a few seconds with
    # "No changes — upstream catalogue unchanged." Public repos get
    # unlimited Action minutes, so the cost is nil.
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "build.py"
      - ".github/workflows/rebuild.yml"

permissions:
  contents: write

concurrency:
  group: rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir feedparser

      - name: Run build
        # build.py fetches the upstream README, regenerates sources.json +
        # index.html, then fetches every RSS/Atom feed in parallel and writes
        # items.json so the page hydrates instantly on first load.
        run: python3 build.py

      - name: Commit any changes
        run: |
          git config user.name  "saorsa-labs-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- sources.json index.html items.json; then
            echo "No changes — upstream catalogue and feed items unchanged."
            exit 0
          fi
          ADDED=$(git diff sources.json | grep -c '^+    "feed":' || true)
          REMOVED=$(git diff sources.json | grep -c '^-    "feed":' || true)
          git add sources.json index.html items.json
          if [ "$ADDED" != "0" ] || [ "$REMOVED" != "0" ]; then
            MSG="chore: rebuild (+${ADDED} / -${REMOVED} feeds, refreshed items)"
          else
            MSG="chore: refresh items.json from upstream feeds"
          fi
          git commit -m "$MSG"
          git push
